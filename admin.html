<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto Fuxion 2026 — Maqueta Consola de Administración</title>
<style>
:root{--blue:#2E5496;--dark:#1F3864;--orange:#ED7D31;--green:#2E7D32;--red:#C0392B;
 --bg:#f1f4f9;--card:#fff;--muted:#6b7a90;--line:#e1e8f2;--shadow:0 4px 16px rgba(31,56,100,.08)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Calibri,Arial,sans-serif}
body{background:var(--bg);color:#22324a}
.hidden{display:none!important}
button{cursor:pointer;font-family:inherit}
.btn{border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px}
.btn-orange{background:var(--orange);color:#fff}.btn-blue{background:var(--blue);color:#fff}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--dark)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
input,select{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;background:#fbfdff;margin-top:3px}
label{font-size:12px;font-weight:600;color:#42526e}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#26415e,#1F3864)}
.login-card{background:#fff;border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.35);padding:34px;width:360px;text-align:center}
.logo{font-weight:900;color:var(--blue);font-size:24px}.logo b{color:var(--orange)}
.login-card h2{font-size:14px;color:var(--muted);font-weight:600;margin:6px 0 18px}
.login-card .field{text-align:left;margin-bottom:12px}

/* LAYOUT */
#app{display:flex;min-height:100vh}
.side{width:230px;background:var(--dark);color:#cdd8ec;flex-shrink:0;padding:0 0 20px}
.side .brand{padding:18px 20px;font-weight:900;font-size:20px;color:#fff;border-bottom:1px solid #2c4a78}
.side .brand b{color:var(--orange)}
.side .grp{font-size:11px;letter-spacing:1px;color:#7f93b5;padding:16px 20px 6px;text-transform:uppercase}
.side a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#cdd8ec;text-decoration:none;font-size:13.5px;border-left:3px solid transparent;cursor:pointer}
.side a:hover{background:#26416b;color:#fff}
.side a.active{background:#26416b;color:#fff;border-color:var(--orange)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;height:58px;display:flex;align-items:center;gap:16px;padding:0 24px;box-shadow:0 1px 6px rgba(0,0,0,.05);position:sticky;top:0;z-index:20}
.topbar h1{font-size:17px;color:var(--dark);flex:1}
.rolechip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.rolechip select{width:auto;margin:0;padding:5px 8px}
.content{padding:22px 26px 50px;overflow:auto}

.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.k{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:16px;border-left:4px solid var(--orange)}
.k b{font-size:26px;color:var(--dark);display:block}.k span{font-size:12px;color:var(--muted)}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.acard{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:22px;text-align:center;cursor:pointer;border-top:4px solid var(--blue)}
.acard:hover{transform:translateY(-2px)}
.acard h3{color:var(--dark);font-size:16px;margin-bottom:4px}.acard p{font-size:12.5px;color:var(--muted)}
.panel{background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:end}
.filters .act{display:flex;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th{background:var(--blue);color:#fff;padding:9px 10px;text-align:left;font-size:12px;position:sticky;top:0}
td{padding:9px 10px;border-bottom:1px solid var(--line)}
tr:nth-child(even) td{background:#f7fafd}
.pill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.pill.ok{background:#e3f3e4;color:var(--green)}.pill.bad{background:#fde3e3;color:var(--red)}.pill.wait{background:#fff3da;color:#b07c00}
.iconbtn{background:none;border:none;cursor:pointer;color:var(--blue);font-size:15px;padding:3px 6px}
.iconbtn:disabled{color:#b9c4d6;cursor:not-allowed}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.toolbar h2{font-size:18px;color:var(--dark)}
.tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:#eef2f8;color:var(--blue)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,30,50,.5);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#fff;border-radius:14px;width:560px;max-width:94vw;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal .mh{background:var(--dark);color:#fff;padding:14px 18px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.modal .mb{padding:18px}
.modal .mf{padding:14px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{cursor:pointer;font-size:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.photo-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tile{border:2px dashed #b9c4d6;border-radius:8px;height:74px;display:flex;align-items:center;justify-content:center;color:#90a0b8;font-size:11px;text-align:center;background:#fafcff;padding:4px}
.note{background:#fff8e7;border:1px solid #f0d98a;border-radius:8px;padding:9px 12px;font-size:12.5px;color:#7a6000;margin-top:10px}
.disc{font-size:11px;color:#9aa7bb;margin-top:20px}
@media(max-width:820px){.side{display:none}.kpi,.filters,.cards{grid-template-columns:1fr 1fr}}
</style></head>
<body>

<section id="login">
 <div class="login-card">
  <div class="logo">FU<b>X</b>ION</div>
  <h2>Consola de Administración · Reto Fuxion 2026</h2>
  <div class="field"><label>Código</label><input value="999999"></div>
  <div class="field"><label>Contraseña</label><input type="password" value="••••••"></div>
  <button class="btn btn-blue" style="width:100%" onclick="enter()">INGRESAR</button>
 </div>
</section>

<div id="app" class="hidden">
 <aside class="side">
  <div class="brand">FU<b>X</b>ION</div>
  <a class="active" data-s="inicio" onclick="go('inicio',this)">Inicio</a>
  <div class="grp">Mantenimiento</div>
  <a data-s="participantes" onclick="go('participantes',this)">Participantes</a>
  <a data-s="avances" onclick="go('avances',this)">Avances semanales</a>
  <div class="grp">Reportes</div>
  <a data-s="r_part" onclick="go('r_part',this)">Participantes</a>
  <a data-s="r_ment" onclick="go('r_ment',this)">Mentores</a>
  <a data-s="r_avc" onclick="go('r_avc',this)">Avances semanales</a>
  <a data-s="r_inac" onclick="go('r_inac',this)">Participantes inactivos</a>
  <a data-s="r_imc" onclick="go('r_imc',this)">IMC</a>
 </aside>
 <div class="main">
  <div class="topbar">
   <h1 id="ptitle">Inicio</h1>
   <div class="rolechip">Rol:
    <select id="role" onchange="setRole()"><option value="editor">Editor</option><option value="revisor">Revisor</option><option value="lectura">Lectura</option></select>
   </div>
   <span style="font-size:13px;color:var(--muted)">Usuario MKT · <a href="#" onclick="logout();return false" style="color:var(--blue)">Salir</a></span>
  </div>
  <div class="content" id="content"></div>
 </div>
</div>

<div id="modal-host"></div>

<script>
function enter(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');go('inicio');}
function logout(){document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');}
let role='editor';
function setRole(){role=document.getElementById('role').value;render();}
function canEdit(){return role==='editor';}
const TITLES={inicio:'Inicio',participantes:'Mantenimiento · Participantes',avances:'Mantenimiento · Avances semanales',
 r_part:'Reportes · Participantes',r_ment:'Reportes · Mentores',r_avc:'Reportes · Avances semanales',r_inac:'Reportes · Participantes inactivos',r_imc:'Reportes · IMC'};
let current='inicio';
function go(s,el){current=s;document.querySelectorAll('.side a').forEach(a=>a.classList.toggle('active',a.dataset.s===s));
 document.getElementById('ptitle').textContent=TITLES[s];render();window.scrollTo(0,0);}

/* demo data (ejemplo, sin datos reales) */
const P=[['1499391','Ana Torres','Empresario','PE','21783','Iván Salazar','Completo','26-05-2026','Activo'],
 ['1614795','Juan Sánchez','Empresario','PE','3004277','Fiorela Carrión','Completo','26-05-2026','Activo'],
 ['3107527','Jorge Gómez','Empresario','EC','26641','Jorge Torres','Completo','25-05-2026','Activo'],
 ['586360','Sara Gordillo','Empresario','CO','3156352','Lady González','Incompleto','—','Inactivo']];
const M=[['16762','J. Perret','jperret@correo.com','1'],['17003','A. de la Guerra','adelaguerra@correo.com','1'],['21783','Iván Salazar','isalazar@correo.com','3']];
const AV=[['1','87.8 kg','—','120 pts ✔','ok','Completo'],['2','86.5 kg','-1.5%','—','ok','Completo'],['3','85.0 kg','-1.7%','—','ok','Completo'],['4','82.6 kg','-2.8%','—','bad','Alerta >2%'],['5','82.5 kg','-0.1%','80 pts ✔','ok','Completo']];
const INAC=[['2163648','Empresario','CR','Tania V.','26641','Jorge Torres','28-04','No realizó avances'],['1511674','Empresario','EC','María T.','2462553','Orlando T.','26-04','No realizó avances'],['3218643','Empresario','PE','Jhordy R.','20066','John Rengifo','20-04','No realizó compras']];
const IMC=[['2980460','Empresario','EC','Fernando V.','26.2','24.6','1.6','7'],['3168509','Cliente Pref.','EC','Laine I.','21.6','21.3','0.3','7'],['3161910','Empresario','CO','Nathalia E.','31.3','28.9','2.4','7']];

function filtersBar(extra){return `<div class="panel"><div class="filters">
 <div><label>Nombre</label><input placeholder="Buscar..."></div>
 <div><label>País</label><select><option>Todos</option><option>PE</option><option>EC</option><option>CO</option><option>MX</option></select></div>
 <div><label>Periodo</label><select><option>2026-04</option><option>2026-03</option></select></div>
 <div class="act"><button class="btn btn-blue">Buscar</button>${extra?'<button class="btn btn-ghost">Exportar Excel</button>':''}</div>
 </div></div>`}

function render(){
 const c=document.getElementById('content');let h='';
 if(current==='inicio'){
  h=`<div class="kpi">
   <div class="k"><b>141</b><span>Participantes activos</span></div>
   <div class="k"><b>131</b><span>Mentores</span></div>
   <div class="k"><b>78%</b><span>Cumplimiento semanal</span></div>
   <div class="k" style="border-color:var(--red)"><b>9</b><span>Inactivos / en riesgo</span></div></div>
   <div class="cards">
    <div class="acard" onclick="go('participantes')"><h3>Participantes</h3><p>Alta, edición y asignación de mentor.</p></div>
    <div class="acard" onclick="go('r_ment')"><h3>Mentores</h3><p>Listado y participantes a cargo.</p></div>
    <div class="acard" onclick="go('avances')"><h3>Avances semanales</h3><p>Editar avance y activar semana 24 h.</p></div>
   </div>`;
 } else if(current==='participantes'){
  h=filtersBar(false)+`<div class="panel"><div class="toolbar"><h2>Listado de participantes</h2><span class="tag">${role==='lectura'?'Solo lectura':'Edición habilitada'}</span></div>
   <table><tr><th>Código</th><th>Nombre</th><th>Tipo</th><th>País</th><th>Mentor</th><th>Registro</th><th>Estado</th><th>Acciones</th></tr>`+
   P.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[5]}</td><td>${r[6]}</td><td><span class="pill ${r[8]==='Activo'?'ok':'bad'}">${r[8]}</span></td>
   <td><button class="iconbtn" ${canEdit()?'':'disabled'} onclick="editPart('${r[1]}')" title="Editar">✎</button>
   <button class="iconbtn" ${canEdit()?'':'disabled'} onclick="assignMentor('${r[1]}')" title="Asignar mentor">👤</button></td></tr>`).join('')+
   `</table></div>`;
 } else if(current==='avances'){
  h=filtersBar(false)+`<div class="panel"><div class="toolbar"><h2>Avances / compras semanales</h2></div>
   <table><tr><th>Cód.</th><th>Nombre</th><th>Género</th><th>Tipo</th><th>Editar</th></tr>`+
   P.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>—</td><td>${r[2]}</td><td><button class="iconbtn" ${canEdit()?'':'disabled'} onclick="editAvance('${r[1]}')">✎</button></td></tr>`).join('')+
   `</table></div>`;
 } else if(current==='r_part'){
  h=filtersBar(true)+tableReport(['Código','Nombre','Tipo','País','Mentor','Registro','Estado'],P.map(r=>[r[0],r[1],r[2],r[3],r[5],r[6],r[8]]));
 } else if(current==='r_ment'){
  h=filtersBar(true)+tableReport(['Código','Nombre','Email','# Participantes'],M);
 } else if(current==='r_avc'){
  h=filtersBar(true)+`<div class="panel"><div class="toolbar"><h2>Avances semanales — Jorge Gómez</h2><button class="btn btn-ghost btn-sm">Exportar Excel</button></div>
   <table><tr><th>Semana</th><th>Peso</th><th>% pérdida</th><th>Compra/pts</th><th>Estado</th></tr>`+
   AV.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td><span class="pill ${r[4]}">${r[5]}</span></td></tr>`).join('')+`</table></div>`;
 } else if(current==='r_inac'){
  h=filtersBar(true)+`<div class="panel"><div class="toolbar"><h2>Participantes inactivos</h2><button class="btn btn-ghost btn-sm">Exportar Excel</button></div>
   <table><tr><th>Código</th><th>Tipo</th><th>País</th><th>Nombre</th><th>Mentor</th><th>Fecha</th><th>Motivo</th></tr>`+
   INAC.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[5]}</td><td>${r[6]}</td><td><span class="pill bad">${r[7]}</span></td></tr>`).join('')+`</table></div>`;
 } else if(current==='r_imc'){
  h=filtersBar(true)+`<div class="panel"><div class="toolbar"><h2>Reporte IMC</h2><button class="btn btn-ghost btn-sm">Exportar Excel</button></div>
   <table><tr><th>Código</th><th>Tipo</th><th>País</th><th>Nombre</th><th>IMC inicial</th><th>IMC final</th><th>IMC reducido</th><th>Semana</th></tr>`+
   IMC.map(r=>`<tr>${r.map(x=>`<td>${x}</td>`).join('')}</tr>`).join('')+`</table></div>`;
 }
 c.innerHTML=h+`<div class="disc">Maqueta de propuesta — Consola de Administración Reto Fuxion 2026 · datos de ejemplo. Roles: Editor (edita), Revisor y Lectura (solo consulta). Todos los reportes se exportan a Excel.</div>`;
}
function tableReport(cols,rows){
 return `<div class="panel"><div class="toolbar"><h2>${TITLES[current].split('· ')[1]}</h2><button class="btn btn-ghost btn-sm">Exportar Excel</button></div>
 <table><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`+
 rows.map(r=>`<tr>${r.map(x=>`<td>${x}</td>`).join('')}</tr>`).join('')+`</table></div>`;
}
function closeModal(){document.getElementById('modal-host').innerHTML='';}
function editPart(n){document.getElementById('modal-host').innerHTML=`
 <div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
  <div class="mh">Editar participante <span class="x" onclick="closeModal()">×</span></div>
  <div class="mb"><div class="grid2">
   <div><label>Nombre</label><input value="${n}"></div><div><label>Email</label><input value="demo@correo.com"></div>
   <div><label>Teléfono</label><input value="+51 ..."></div><div><label>Celular</label><input value="+51 ..."></div>
   <div><label>Fecha de nacimiento</label><input value="1990-05-12"></div>
   <div><label>Tipo</label><select><option>Empresario</option><option>Cliente Preferido</option><option>Director</option><option>Staff</option><option>Co-Empresario</option></select></div>
   <div><label>Género</label><select><option>Mujer</option><option>Hombre</option></select></div>
   <div><label>Rpta. Mentor</label><select><option>Aceptado</option><option>Pendiente</option><option>Rechazado</option></select></div>
   <div><label>Estado</label><select><option>Activo</option><option>Inactivo</option></select></div>
  </div></div>
  <div class="mf"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-orange" onclick="closeModal()">Guardar</button></div>
 </div></div>`;}
function assignMentor(n){document.getElementById('modal-host').innerHTML=`
 <div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:420px">
  <div class="mh">Asignar mentor a ${n} <span class="x" onclick="closeModal()">×</span></div>
  <div class="mb"><div><label>Código Fuxion del mentor (EF)</label><input value="21783"></div>
  <div class="note">Se valida que el código sea Empresario Fuxion y se envía aviso por correo.</div></div>
  <div class="mf"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-orange" onclick="closeModal()">Asignar</button></div>
 </div></div>`;}
function editAvance(n){document.getElementById('modal-host').innerHTML=`
 <div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
  <div class="mh">Editar avance — ${n} <span class="x" onclick="closeModal()">×</span></div>
  <div class="mb">
   <div class="grid3" style="align-items:end"><div><label>Semana</label><select>${Array.from({length:13},(_,i)=>`<option>${i+1}</option>`).join('')}</select></div>
   <div style="grid-column:span 2"><button class="btn btn-orange" style="width:100%">Activar semana por 24 horas</button></div></div>
   <div class="grid3" style="margin-top:12px"><div><label>Talla (cm)</label><input value="170"></div><div><label>Peso (kg)</label><input value="82.4"></div><div><label>Cintura (cm)</label><input value="86"></div>
   <div><label>Cadera (cm)</label><input value="98"></div><div><label>Pecho (cm)</label><input value="94"></div><div><label>Cuello (cm)</label><input value="40"></div></div>
   <label style="display:block;margin-top:12px">Fotos del avance</label>
   <div class="photo-tiles"><div class="tile">Foto wincha</div><div class="tile">Foto frente</div><div class="tile">Foto perfil</div><div class="tile">Foto medidas</div></div>
  </div>
  <div class="mf"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-orange" onclick="closeModal()">Guardar</button></div>
 </div></div>`;}
</script>
</body></html>
